name: CI

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: src/ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/ui
        run: npm ci

      - name: Test frontend
        working-directory: src/ui
        run: npm test

      - name: Build frontend
        working-directory: src/ui
        run: npm run build

      - name: Test Go
        run: go test ./...

      - name: Build Go
        run: |
          version="$(go run ./tools/buildversion)"
          go build -ldflags "-X main.ActGUIVersion=${version}" -o act-gui ./src

      - name: Smoke test binary
        run: ./act-gui --help

      - name: Configure act runner image
        run: |
          config_dir="${XDG_CONFIG_HOME:-$HOME/.config}/act"
          mkdir -p "${config_dir}"
          cat > "${config_dir}/actrc" <<'EOF'
          -P ubuntu-latest=catthehacker/ubuntu:act-latest
          -P ubuntu-22.04=catthehacker/ubuntu:act-22.04
          -P ubuntu-20.04=catthehacker/ubuntu:act-20.04
          -P ubuntu-18.04=catthehacker/ubuntu:act-18.04
          EOF

      - name: Run test workflow
        run: ./act-gui -W src/testdata/workflows/test.yml

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: src/ui/package-lock.json

      - name: Detect version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          if [[ ! "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Unsupported release tag: ${version}" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Install frontend dependencies
        working-directory: src/ui
        run: npm ci

      - name: Build frontend
        working-directory: src/ui
        run: npm run build

      - name: Build release artifacts
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          mkdir -p build/release dist/release

          build_target() {
            local goos="$1"
            local goarch="$2"
            local ext="$3"
            local name="act-gui_${version}_${goos}_${goarch}"
            local dir="build/release/${name}"
            local binary="${dir}/act-gui${ext}"

            mkdir -p "${dir}"
            GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 go build -trimpath -ldflags "-s -w -X main.ActGUIVersion=${version}" -o "${binary}" ./src

            if [[ "${goos}" == "windows" ]]; then
              (cd "${dir}" && zip -q "../../../dist/release/${name}.zip" "act-gui${ext}")
            else
              tar -C "${dir}" -czf "dist/release/${name}.tar.gz" "act-gui${ext}"
            fi
          }

          build_target linux amd64 ""
          build_target linux arm64 ""
          build_target darwin amd64 ""
          build_target darwin arm64 ""
          build_target windows amd64 ".exe"

          (cd dist/release && sha256sum * > checksums.txt)

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ steps.version.outputs.version }}" dist/release/* --title "act-gui ${{ steps.version.outputs.version }}" --generate-notes --verify-tag
