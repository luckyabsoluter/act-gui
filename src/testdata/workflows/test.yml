name: Dependency Workflow
on: [push]
jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Run Linter
        run: echo "Linting code..." && sleep 1
  build:
    name: Build Artifacts
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Build Artifacts
        run: echo "Building..." && sleep 2
  test-1:
    name: Integration Test 1
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Integration Test 1
        run: echo "Running test 1..." && sleep 1
  test-2:
    name: Integration Test 2
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Integration Test 2
        run: echo "Running test 2..." && sleep 1
  deploy:
    name: Deploy to Production
    needs: [test-1, test-2]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Production
        run: echo "Deploying..." && sleep 1
